server:
  port: ${SERVER_PORT:9090}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${DB_URL:jdbc:h2:file:./soulpal-db;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:soulpal-default-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  access-expiration: 3600000     # 1시간
  refresh-expiration: 604800000  # 7일

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3}
  timeout: 120

logging:
  level:
    com.soulpal: INFO
