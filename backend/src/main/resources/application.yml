server:
  port: ${SERVER_PORT:9090}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    url: ${DB_URL:jdbc:h2:file:./soulpal-db;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    open-in-view: false

  flyway:
    enabled: ${FLYWAY_ENABLED:false}   # dev는 ddl-auto:update 사용. prod에서 true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s  # 5분 캐시

  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 100

jwt:
  secret: ${JWT_SECRET:soulpal-default-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  access-expiration: 3600000     # 1시간
  refresh-expiration: 604800000  # 7일

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3}
  timeout: 120

# Rate Limiting (분당 요청 수)
rate-limit:
  chat:
    capacity: 30          # 채팅 API: 사용자당 분당 최대 30건
    refill-per-minute: 20
  auth:
    capacity: 10          # 인증 API: IP당 분당 최대 10건 (브루트포스 방어)

logging:
  level:
    com.soulpal: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env,threaddump,heapdump
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized   # prod에서 인증된 사용자만 상세 표시
    loggers:
      enabled: true                   # 런타임 로그 레벨 변경 가능 (POST /actuator/loggers/com.soulpal)
  info:
    env:
      enabled: true
    git:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
