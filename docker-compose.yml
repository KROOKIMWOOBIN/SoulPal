services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: soulpal-db
    environment:
      POSTGRES_DB: soulpal
      POSTGRES_USER: soulpal
      POSTGRES_PASSWORD: soulpal1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulpal -d soulpal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: soulpal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Ollama ───────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: soulpal-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # Ollama 기동 후 모델 자동 pull (최초 1회, 이후 볼륨 캐시)
  ollama-init:
    image: ollama/ollama:latest
    container_name: soulpal-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3"]
    restart: "no"

  # ── Spring Boot (Tomcat) — port 9090 ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soulpal-backend
    ports:
      - "9090:9090"
    environment:
      - SERVER_PORT=9090
      - DB_URL=jdbc:postgresql://db:5432/soulpal
      - DB_USER=soulpal
      - DB_PASSWORD=soulpal1234
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - JWT_SECRET=soulpal-production-secret-change-this-in-real-deployment-please
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/api/auth/me || true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Nginx (Vue SPA) — port 8080 ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soulpal-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  redis_data:
