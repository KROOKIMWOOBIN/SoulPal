name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project scaffold
        run: |
          # 기존 파일 백업
          cp pubspec.yaml /tmp/pubspec.yaml.bak
          cp -r lib /tmp/lib_bak
          cp -r assets /tmp/assets_bak 2>/dev/null || true

          # Flutter 프로젝트 스캐폴드 생성 (android/ 폴더 생성)
          flutter create --project-name soulpal --org com.soulpal --platforms android . --overwrite --no-pub

          # 백업 복원
          cp /tmp/pubspec.yaml.bak pubspec.yaml
          rm -rf lib && cp -r /tmp/lib_bak lib
          rm -rf assets && cp -r /tmp/assets_bak assets 2>/dev/null || true

      - name: Get dependencies
        run: flutter pub get

      - name: Fetch llama.cpp source for Android build
        run: |
          LLAMA_SRC=$(find ~/.pub-cache -path "*/llama_cpp_dart-*/src" -type d | head -1)
          echo "llama_cpp_dart src: $LLAMA_SRC"
          git clone --depth 1 https://github.com/ggml-org/llama.cpp "$LLAMA_SRC/llama.cpp"

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk SoulPal-arm64.apk   || true
          mv app-armeabi-v7a-release.apk SoulPal-arm32.apk || true
          mv app-x86_64-release.apk SoulPal-x86_64.apk     || true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SoulPal ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📱 SoulPal ${{ steps.version.outputs.VERSION }}

            나만의 AI 친구 앱 — 완전 오프라인, 모든 대화가 기기 안에 저장됩니다.

            ---

            ### 📥 설치 방법

            1. 아래 APK 파일 다운로드
            2. 안드로이드 설정 → **출처를 알 수 없는 앱 허용** 켜기
            3. 다운로드한 APK 파일 실행 → 설치

            | 파일 | 기기 유형 |
            |------|-----------|
            | `SoulPal-arm64.apk` | 대부분의 최신 안드로이드 폰 **(권장)** |
            | `SoulPal-arm32.apk` | 구형 안드로이드 폰 |

            > **첫 실행 시 AI 모델 (~800MB) 다운로드가 필요합니다.**
          files: |
            build/app/outputs/flutter-apk/SoulPal-arm64.apk
            build/app/outputs/flutter-apk/SoulPal-arm32.apk
          draft: false
          prerelease: false
