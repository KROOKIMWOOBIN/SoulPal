name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project scaffold
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml.bak
          cp -r lib /tmp/lib_bak
          cp -r assets /tmp/assets_bak 2>/dev/null || true
          cp -r vendor /tmp/vendor_bak

          flutter create --project-name soulpal --org com.soulpal --platforms android . --overwrite --no-pub

          cp /tmp/pubspec.yaml.bak pubspec.yaml
          rm -rf lib && cp -r /tmp/lib_bak lib
          rm -rf assets && cp -r /tmp/assets_bak assets 2>/dev/null || true
          rm -rf vendor && cp -r /tmp/vendor_bak vendor

      - name: Patch android build.gradle (NDK + minSdk)
        run: |
          python3 - << 'EOF'
          import re, sys, os

          # Find the gradle file
          kts = 'android/app/build.gradle.kts'
          groovy = 'android/app/build.gradle'
          path = kts if os.path.exists(kts) else groovy
          print(f"Patching: {path}")

          with open(path) as f:
              content = f.read()

          # Show before
          for line in content.splitlines():
              if 'minSdk' in line or 'ndkVersion' in line:
                  print(f"  BEFORE: {line.strip()}")

          # Patch NDK
          content, n = re.subn(
              r'ndkVersion\s*=\s*flutter\.ndkVersion',
              'ndkVersion = "27.0.12077973"', content)
          if n == 0:
              content, n = re.subn(
                  r'ndkVersion\s+flutter\.ndkVersion',
                  'ndkVersion "27.0.12077973"', content)
          print(f"  NDK replacements: {n}")

          # Patch minSdk
          content, n = re.subn(
              r'minSdk\s*=\s*flutter\.minSdkVersion',
              'minSdk = 23', content)
          if n == 0:
              content, n = re.subn(
                  r'minSdkVersion\s+flutter\.minSdkVersion',
                  'minSdkVersion 23', content)
          print(f"  minSdk replacements: {n}")

          with open(path, 'w') as f:
              f.write(content)

          # Verify
          for line in content.splitlines():
              if 'minSdk' in line or 'ndkVersion' in line:
                  print(f"  AFTER:  {line.strip()}")

          # Fail if minSdk 21 still present
          if 'flutter.minSdkVersion' in content:
              print("ERROR: minSdk patch failed!")
              sys.exit(1)
          EOF

      - name: Add INTERNET permission and url_launcher queries to AndroidManifest
        run: |
          python3 - << 'EOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f:
              content = f.read()

          # INTERNET permission
          if 'INTERNET' not in content:
              content = content.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.INTERNET"/>\n    <application',
                  1
              )
              print('Added INTERNET permission')
          else:
              print('INTERNET permission already present')

          # url_launcher queries (Android 11+)
          if '<queries>' not in content:
              queries = (
                  '\n    <queries>\n'
                  '        <intent>\n'
                  '            <action android:name="android.intent.action.VIEW" />\n'
                  '            <data android:scheme="https" />\n'
                  '        </intent>\n'
                  '    </queries>'
              )
              content = content.replace('</manifest>', queries + '\n</manifest>', 1)
              print('Added url_launcher queries')
          else:
              print('queries already present')

          with open(path, 'w') as f:
              f.write(content)
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk SoulPal-arm64.apk   || true
          mv app-armeabi-v7a-release.apk SoulPal-arm32.apk || true
          mv app-x86_64-release.apk SoulPal-x86_64.apk     || true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SoulPal ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📱 SoulPal ${{ steps.version.outputs.VERSION }}

            나만의 AI 친구 앱 — 완전 오프라인, 모든 대화가 기기 안에 저장됩니다.

            ---

            ### 📥 설치 방법

            1. 아래 APK 파일 다운로드
            2. 안드로이드 설정 → **출처를 알 수 없는 앱 허용** 켜기
            3. 다운로드한 APK 파일 실행 → 설치

            | 파일 | 기기 유형 |
            |------|-----------|
            | `SoulPal-arm64.apk` | 대부분의 최신 안드로이드 폰 **(권장)** |
            | `SoulPal-arm32.apk` | 구형 안드로이드 폰 |

            > **첫 실행 시 AI 모델 (~800MB) 다운로드가 필요합니다.**
          files: |
            build/app/outputs/flutter-apk/SoulPal-arm64.apk
            build/app/outputs/flutter-apk/SoulPal-arm32.apk
          draft: false
          prerelease: false
