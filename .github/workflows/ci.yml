name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 백엔드 단위 테스트 ────────────────────────────────────────────────────────
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run unit tests (skip integration, skip frontend build)
        working-directory: backend
        run: |
          ./gradlew test \
            --tests "com.soulpal.service.*" \
            --tests "com.soulpal.exception.*" \
            -x buildFrontend \
            -x copyFrontendToBuild \
            -x npmInstallFrontend \
            --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-report
          path: backend/build/reports/tests/test/

  # ── 백엔드 통합 테스트 (TestContainers: PostgreSQL + Redis) ──────────────────
  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run integration tests
        working-directory: backend
        run: |
          ./gradlew test \
            --tests "com.soulpal.integration.*" \
            -x buildFrontend \
            -x copyFrontendToBuild \
            -x npmInstallFrontend \
            --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload integration test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-report
          path: backend/build/reports/tests/test/

  # ── 프론트엔드 테스트 ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Build (check no compile errors)
        working-directory: frontend
        run: npm run build

  # ── Docker 이미지 빌드 검증 (push to main만) ─────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [ backend-unit, frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Build backend image
        run: docker compose build backend
        env:
          POSTGRES_DB: soulpal
          POSTGRES_USER: soulpal
          POSTGRES_PASSWORD: test
          JWT_SECRET: ci-test-secret-key-must-be-at-least-512-bits-long-for-hs512-algorithm-used-in-ci
          REDIS_PORT: 6379
          SERVER_PORT: 9090
          OLLAMA_MODEL: llama3

      - name: Build frontend image
        run: docker compose build frontend
        env:
          POSTGRES_DB: soulpal
          POSTGRES_USER: soulpal
          POSTGRES_PASSWORD: test
          JWT_SECRET: ci-test-secret-key-must-be-at-least-512-bits-long-for-hs512-algorithm-used-in-ci
          REDIS_PORT: 6379
          SERVER_PORT: 9090
          OLLAMA_MODEL: llama3
