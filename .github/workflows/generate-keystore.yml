name: 🔑 키스토어 생성 (최초 1회만 실행)

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore soulpal-release.jks \
            -alias soulpal \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass soulpal_store \
            -keypass soulpal_key \
            -dname "CN=SoulPal, OU=App, O=SoulPal, L=Seoul, S=Seoul, C=KR" \
            2>&1

          echo ""
          echo "=================================================="
          echo "  GitHub Settings > Secrets > Actions 에 추가하세요"
          echo "=================================================="
          echo ""
          echo "Secret 이름: KEYSTORE_BASE64"
          echo "Secret 값 (아래 전체 복사):"
          echo "---"
          base64 -w0 soulpal-release.jks
          echo ""
          echo "---"
          echo ""
          echo "Secret 이름: KEY_ALIAS   / 값: soulpal"
          echo "Secret 이름: KEY_PASSWORD / 값: soulpal_key"
          echo "Secret 이름: STORE_PASSWORD / 값: soulpal_store"

      - name: Upload keystore artifact (7일 보관)
        uses: actions/upload-artifact@v4
        with:
          name: soulpal-release-keystore
          path: soulpal-release.jks
          retention-days: 7
