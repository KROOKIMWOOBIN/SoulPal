name: Generate & Commit Android Directory

# 수동으로만 실행 — android/ 가 없을 때 또는 Flutter 버전 업시 1회 실행
on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate Android scaffold and commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Generate android/ scaffold
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml.bak
          cp -r lib /tmp/lib_bak
          cp -r assets /tmp/assets_bak 2>/dev/null || true
          cp -r vendor /tmp/vendor_bak

          flutter create --project-name soulpal --org com.soulpal --platforms android . --overwrite --no-pub

          cp /tmp/pubspec.yaml.bak pubspec.yaml
          rm -rf lib && cp -r /tmp/lib_bak lib
          rm -rf assets && cp -r /tmp/assets_bak assets 2>/dev/null || true
          rm -rf vendor && cp -r /tmp/vendor_bak vendor

      - name: Apply Android patches (NDK + minSdk + permissions)
        run: |
          python3 - << 'EOF'
          import re, sys, os

          # ── build.gradle 패치 ──────────────────────────────────
          kts = 'android/app/build.gradle.kts'
          groovy = 'android/app/build.gradle'
          path = kts if os.path.exists(kts) else groovy

          with open(path) as f:
              content = f.read()

          content, n = re.subn(r'ndkVersion\s*=\s*flutter\.ndkVersion',
                                'ndkVersion = "27.0.12077973"', content)
          if n == 0:
              content, _ = re.subn(r'ndkVersion\s+flutter\.ndkVersion',
                                   'ndkVersion "27.0.12077973"', content)

          content, n = re.subn(r'minSdk\s*=\s*flutter\.minSdkVersion',
                                'minSdk = 23', content)
          if n == 0:
              content, _ = re.subn(r'minSdkVersion\s+flutter\.minSdkVersion',
                                   'minSdkVersion 23', content)

          with open(path, 'w') as f:
              f.write(content)

          if 'flutter.minSdkVersion' in content:
              print("ERROR: minSdk patch failed!")
              sys.exit(1)
          print(f"Patched {path}")

          # ── AndroidManifest 패치 ───────────────────────────────
          manifest = 'android/app/src/main/AndroidManifest.xml'
          with open(manifest) as f:
              m = f.read()

          if 'INTERNET' not in m:
              m = m.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.INTERNET"/>\n    <application',
                  1)
              print('Added INTERNET permission')

          if '<queries>' not in m:
              queries = (
                  '\n    <queries>\n'
                  '        <intent>\n'
                  '            <action android:name="android.intent.action.VIEW" />\n'
                  '            <data android:scheme="https" />\n'
                  '        </intent>\n'
                  '    </queries>')
              m = m.replace('</manifest>', queries + '\n</manifest>', 1)
              print('Added url_launcher queries')

          with open(manifest, 'w') as f:
              f.write(m)
          EOF

      - name: Commit android/ to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/
          if git diff --cached --quiet; then
            echo "android/ unchanged, nothing to commit"
          else
            git commit -m "chore: regenerate android/ scaffold (Flutter 3.29.0)"
            git push origin HEAD
            echo "android/ committed and pushed"
          fi
