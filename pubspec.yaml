name: soulpal
description: "SoulPal - Your Virtual Friend powered by local AI"
publish_to: 'none'
version: 1.2.0+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local LLM (llama.cpp 내장 - Ollama 불필요)
  llama_cpp_dart:
    path: vendor/llama_cpp_dart

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # HTTP (모델 다운로드용)
  http: ^1.4.0

  # FFI (llama_cpp_dart 의존성)
  ffi: ^2.1.4

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.0

  cupertino_icons: ^1.0.8
  share_plus: ^10.0.0
  package_info_plus: ^8.1.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
